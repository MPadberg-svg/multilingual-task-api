repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.4.0
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --exclude=apps/**/migrations]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy apps/ --ignore-missing-imports
        language: system
        pass_filenames: false
      - id: pytest-fast
        name: pytest-fast
        entry: python -m pytest -q -m "not slow"
        language: system
        pass_filenames: false
        stages: [pre-push]
