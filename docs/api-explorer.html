<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multilingual Task API Explorer</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #818cf8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --border: #334155;
    --radius: 12px;
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    padding: 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .lang-switcher {
    display: flex;
    gap: 0.5rem;
  }
  .lang-btn {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .lang-btn:hover, .lang-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 1.5rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px -5px rgba(0,0,0,0.4);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .method {
    padding: 0.25rem 0.75rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .method.get { background: var(--success); color: #fff; }
  .method.post { background: var(--accent); color: #fff; }
  .endpoint {
    font-family: 'Fira Code', monospace;
    font-size: 0.875rem;
    color: var(--accent);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { transform: scale(1.02); }
  .btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
  }
  .btn:hover::after { left: 100%; }
  .btn:active { transform: scale(0.98); }
  .response {
    margin-top: 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    overflow-x: auto;
    white-space: pre-wrap;
    display: none;
  }
  .response.visible { display: block; }
  .cache-hit {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem 0.75rem;
    background: rgba(34,197,94,0.15);
    color: var(--success);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cache-hit.visible { opacity: 1; }
  .cache-hit::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .spinner.visible { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .score-bar {
    height: 8px;
    background: var(--surface-2);
    border-radius: 4px;
    margin-top: 0.75rem;
    overflow: hidden;
  }
  .score-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--success), var(--accent));
    border-radius: 4px;
    transition: width 1.5s ease-out;
  }
  textarea, input {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    resize: vertical;
    margin-top: 0.75rem;
  }
  textarea:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
  }
  .improvements {
    margin-top: 1rem;
    list-style: none;
  }
  .improvements li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .improvements li::before {
    content: '→';
    color: var(--accent);
    font-weight: bold;
  }
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    header { flex-direction: column; text-align: center; }
  }
</style>
<base target="_blank">
</head>
<body>
<header>
  <h1 id="page-title">Multilingual Task API Explorer</h1>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="fr">FR</button>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <span class="method get">GET</span>
      <span class="endpoint">/api/v1/tasks/</span>
    </div>
    <p id="list-desc">List all tasks with Redis caching (5min TTL)</p>
    <button class="btn" id="btn-list">
      <span id="btn-list-text">Send Request</span>
      <div class="spinner" id="spinner-list"></div>
    </button>
    <div class="cache-hit" id="cache-list">Cache Hit</div>
    <div class="response" id="resp-list"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="method post">POST</span>
      <span class="endpoint">/api/v1/ai/suggest-task/</span>
    </div>
    <p id="ai-desc">Generate AI-powered translations for a task description</p>
    <textarea id="ai-input" rows="3" placeholder="Enter task description..."></textarea>
    <button class="btn" id="btn-ai" style="margin-top:0.75rem;">
      <span id="btn-ai-text">Generate</span>
      <div class="spinner" id="spinner-ai"></div>
    </button>
    <div class="response" id="resp-ai"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="method post">POST</span>
      <span class="endpoint">/api/v1/ai/evaluate-quality/</span>
    </div>
    <p id="eval-desc">Evaluate prompt quality with AI scoring</p>
    <input id="eval-input" type="text" placeholder="Enter prompt text...">
    <button class="btn" id="btn-eval" style="margin-top:0.75rem;">
      <span id="btn-eval-text">Evaluate</span>
      <div class="spinner" id="spinner-eval"></div>
    </button>
    <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
    <ul class="improvements" id="improvements"></ul>
    <div class="response" id="resp-eval"></div>
  </div>
</main>

<script>
  const i18n = {
    en: {
      title: "Multilingual Task API Explorer",
      listDesc: "List all tasks with Redis caching (5min TTL)",
      btnList: "Send Request",
      aiDesc: "Generate AI-powered translations for a task description",
      aiPlaceholder: "Enter task description...",
      btnAi: "Generate",
      evalDesc: "Evaluate prompt quality with AI scoring",
      evalPlaceholder: "Enter prompt text...",
      btnEval: "Evaluate",
      cacheHit: "Cache Hit",
      mockTasks: [
        {id:"a1b2c3d4", title:"Review dataset annotations", status:"pending", user:"demo0"},
        {id:"e5f6g7h8", title:"Train classification model", status:"in_progress", user:"demo1"},
        {id:"i9j0k1l2", title:"Validate test results", status:"completed", user:"demo2"}
      ],
      aiResponse: {en:"Review dataset annotations", es:"Revisar anotaciones del dataset", fr:"Revoir les annotations du dataset"},
      improvements: ["Add specific examples","Include error handling","Specify output format"]
    },
    es: {
      title: "Explorador de API de Tareas Multilingües",
      listDesc: "Listar todas las tareas con caché Redis (TTL 5min)",
      btnList: "Enviar Petición",
      aiDesc: "Generar traducciones con IA para una descripción de tarea",
      aiPlaceholder: "Ingrese descripción de la tarea...",
      btnAi: "Generar",
      evalDesc: "Evaluar calidad del prompt con puntuación IA",
      evalPlaceholder: "Ingrese texto del prompt...",
      btnEval: "Evaluar",
      cacheHit: "Caché Activado",
      mockTasks: [
        {id:"a1b2c3d4", title:"Revisar anotaciones del dataset", status:"pending", user:"demo0"},
        {id:"e5f6g7h8", title:"Entrenar modelo de clasificación", status:"in_progress", user:"demo1"},
        {id:"i9j0k1l2", title:"Validar resultados de prueba", status:"completed", user:"demo2"}
      ],
      aiResponse: {en:"Review dataset annotations", es:"Revisar anotaciones del dataset", fr:"Revoir les annotations du dataset"},
      improvements: ["Agregar ejemplos específicos","Incluir manejo de errores","Especificar formato de salida"]
    },
    fr: {
      title: "Explorateur API de Tâches Multilingues",
      listDesc: "Lister toutes les tâches avec cache Redis (TTL 5min)",
      btnList: "Envoyer la Requête",
      aiDesc: "Générer des traductions IA pour une description de tâche",
      aiPlaceholder: "Entrez la description de la tâche...",
      btnAi: "Générer",
      evalDesc: "Évaluer la qualité du prompt avec score IA",
      evalPlaceholder: "Entrez le texte du prompt...",
      btnEval: "Évaluer",
      cacheHit: "Cache Activé",
      mockTasks: [
        {id:"a1b2c3d4", title:"Revoir les annotations du dataset", status:"pending", user:"demo0"},
        {id:"e5f6g7h8", title:"Entraîner le modèle de classification", status:"in_progress", user:"demo1"},
        {id:"i9j0k1l2", title:"Valider les résultats de test", status:"completed", user:"demo2"}
      ],
      aiResponse: {en:"Review dataset annotations", es:"Revisar anotaciones del dataset", fr:"Revoir les annotations du dataset"},
      improvements: ["Ajouter des exemples spécifiques","Inclure la gestion d'erreurs","Spécifier le format de sortie"]
    }
  };

  let currentLang = 'en';

  function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    const t = i18n[lang];
    document.getElementById('page-title').textContent = t.title;
    document.getElementById('list-desc').textContent = t.listDesc;
    document.getElementById('btn-list-text').textContent = t.btnList;
    document.getElementById('ai-desc').textContent = t.aiDesc;
    document.getElementById('ai-input').placeholder = t.aiPlaceholder;
    document.getElementById('btn-ai-text').textContent = t.btnAi;
    document.getElementById('eval-desc').textContent = t.evalDesc;
    document.getElementById('eval-input').placeholder = t.evalPlaceholder;
    document.getElementById('btn-eval-text').textContent = t.btnEval;
    document.getElementById('cache-list').textContent = t.cacheHit;
    // Refresh visible responses
    const listResp = document.getElementById('resp-list');
    if(listResp.classList.contains('visible')) renderList();
    const aiResp = document.getElementById('resp-ai');
    if(aiResp.classList.contains('visible')) renderAi();
    const evalResp = document.getElementById('resp-eval');
    if(evalResp.classList.contains('visible')) renderEval();
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
  });

  function renderList() {
    const t = i18n[currentLang];
    const tasks = t.mockTasks.map(task => ({
      id: task.id,
      title: task.title,
      status: task.status,
      user_id: task.user,
      created_at: new Date().toISOString()
    }));
    document.getElementById('resp-list').textContent = JSON.stringify({count:3, results:tasks, cached:true}, null, 2);
  }

  document.getElementById('btn-list').addEventListener('click', () => {
    const spinner = document.getElementById('spinner-list');
    const resp = document.getElementById('resp-list');
    const cache = document.getElementById('cache-list');
    spinner.classList.add('visible');
    resp.classList.remove('visible');
    cache.classList.remove('visible');
    setTimeout(() => {
      spinner.classList.remove('visible');
      renderList();
      resp.classList.add('visible');
      cache.classList.add('visible');
    }, 600);
  });

  function renderAi() {
    const t = i18n[currentLang];
    const input = document.getElementById('ai-input').value || t.mockTasks[0].title;
    document.getElementById('resp-ai').textContent = JSON.stringify({
      input: input,
      translations: t.aiResponse,
      confidence: 0.94,
      model: "gpt-4o",
      cached: false
    }, null, 2);
  }

  document.getElementById('btn-ai').addEventListener('click', () => {
    const spinner = document.getElementById('spinner-ai');
    const resp = document.getElementById('resp-ai');
    spinner.classList.add('visible');
    resp.classList.remove('visible');
    setTimeout(() => {
      spinner.classList.remove('visible');
      renderAi();
      resp.classList.add('visible');
    }, 1200);
  });

  function renderEval() {
    const t = i18n[currentLang];
    const input = document.getElementById('eval-input').value || "Translate this task";
    document.getElementById('resp-eval').textContent = JSON.stringify({
      prompt: input,
      score: 85,
      max_score: 100,
      model: "gpt-4o",
      cached: false
    }, null, 2);
    document.getElementById('score-fill').style.width = '85%';
    const ul = document.getElementById('improvements');
    ul.innerHTML = '';
    t.improvements.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item;
      ul.appendChild(li);
    });
  }

  document.getElementById('btn-eval').addEventListener('click', () => {
    const spinner = document.getElementById('spinner-eval');
    const resp = document.getElementById('resp-eval');
    const score = document.getElementById('score-fill');
    spinner.classList.add('visible');
    resp.classList.remove('visible');
    score.style.width = '0%';
    setTimeout(() => {
      spinner.classList.remove('visible');
      renderEval();
      resp.classList.add('visible');
    }, 1500);
  });

  setLanguage('en');
</script>
</body>
</html>
