name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: flake8 apps/ --max-line-length=100 --exclude=migrations
      - run: black --check apps/
      - run: isort --check-only apps/
      - run: mypy apps/ --ignore-missing-imports

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    # No Postgres or Redis services needed — tests use SQLite + LocMemCache
    # via config.settings.testing (set in pytest.ini)
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      OPENAI_API_KEY: sk-test-dummy-key
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run test suite
        run: pytest --cov=apps --cov-report=xml --cov-fail-under=85
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - run: bandit -r apps/ -ll --exclude apps/migrations
      - run: pip-audit -r requirements.txt --strict
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json